# nginx vhost for the hosted Sheets MCP.
#
# Copy to /etc/nginx/sites-available/sheets-mcp.digiboffins.com.conf,
# symlink into sites-enabled, then:
#
#   sudo nginx -t && sudo systemctl reload nginx
#   sudo certbot --nginx -d sheets-mcp.digiboffins.com
#
# Replace SHEETS_MCP_DOMAIN below with your actual subdomain.

server {
    listen 80;
    listen [::]:80;
    server_name sheets-mcp.digiboffins.com;

    # certbot will inject the SSL block + 301 redirect here.
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name sheets-mcp.digiboffins.com;

    # SSL paths populated by certbot.
    # ssl_certificate     /etc/letsencrypt/live/sheets-mcp.digiboffins.com/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/sheets-mcp.digiboffins.com/privkey.pem;

    # MCP needs streamed request/response bodies — don't buffer.
    proxy_buffering off;
    proxy_request_buffering off;
    proxy_http_version 1.1;
    proxy_read_timeout 300s;
    proxy_send_timeout 300s;

    client_max_body_size 5m;

    location / {
        proxy_pass http://127.0.0.1:5020;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
